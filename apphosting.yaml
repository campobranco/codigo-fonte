# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 1024

# Environment variables and secrets.
env:
  # --- Variáveis Públicas (Firebase, VAPID) ---
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: FIREBASE_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "campo-branco.firebaseapp.com"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "campo-branco"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "campo-branco.firebasestorage.app"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "660553166328"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:660553166328:web:3b50f3fd926cddb87eba0d"
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_VAPID_PUBLIC_KEY
    value: "BA7he-Uqiclqp1EtSMW9__Z73UyPogRQfUJxPWeJ5HLQ0N2bYxKqdqfMpmZVmCNPPP6GnCDY"
    availability:
      - BUILD
      - RUNTIME
  
  - variable: VAPID_SUBJECT
    value: "mailto:admin@campo-branco.web.app"
  - variable: FB_ADMIN_CLIENT_EMAIL
    secret: FIREBASE_CLIENT_EMAIL
  - variable: VAPID_PRIVATE_KEY
    secret: VAPID_PRIVATE_KEY
  - variable: FB_ADMIN_PRIVATE_KEY
    secret: FIREBASE_PRIVATE_KEY

